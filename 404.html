<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>404 | Page Not Found - TinyCraft</title>
    <link rel="icon" type="image/png" href="https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=64&h=64&fit=crop">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #111111;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark mode styles */
        body.dark {
            background-color: #0F0F0F;
            color: #F5F5F5;
        }

        /* Brand colors */
        .logo-icon, .logo-text {
            color: #C19A6B !important;
        }

        .logo-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-decoration: none;
        }

        /* Control buttons */
        .control-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(193, 154, 107, 0.12);
            transition: all 0.3s ease;
            cursor: pointer;
            color: inherit;
            border: 1px solid rgba(193, 154, 107, 0.25);
            backdrop-filter: blur(4px);
        }

        .control-btn:hover {
            background: rgba(193, 154, 107, 0.3);
            transform: translateY(-2px);
        }

        /* Animation */
        @keyframes floatSlow {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        .float-404 {
            animation: floatSlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0px rgba(193, 154, 107, 0); }
            50% { text-shadow: 0 0 25px rgba(193, 154, 107, 0.6); }
            100% { text-shadow: 0 0 0px rgba(193, 154, 107, 0); }
        }
        
        .glow-text {
            animation: pulseGlow 2.5s ease-in-out infinite;
        }

        /* Button styles */
        .btn-primary {
            background-color: #C19A6B;
            color: white;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 20px -8px rgba(193, 154, 107, 0.4);
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary:hover {
            background-color: #A87B4A;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(193, 154, 107, 0.5);
        }
        
        .btn-outline {
            border: 2px solid #C19A6B;
            color: #C19A6B;
            background: transparent;
            transition: all 0.3s ease;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background-color: rgba(193, 154, 107, 0.1);
            transform: translateY(-2px);
        }

        /* RTL Support - Fixed positioning */
        [dir="rtl"] .logo-container {
            left: auto !important;
            right: 2rem !important;
        }
        
        [dir="rtl"] .controls-container {
            right: auto !important;
            left: 2rem !important;
        }
        
        [dir="rtl"] .btn-primary svg,
        [dir="rtl"] .btn-outline svg {
            transform: scaleX(-1);
        }
        
        [dir="rtl"] .flex-row {
            flex-direction: row-reverse;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .control-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            .logo-brand span {
                font-size: 1.5rem;
            }
            .logo-brand svg {
                width: 1.6rem;
                height: 1.6rem;
            }
            .btn-primary, .btn-outline {
                padding: 10px 24px;
                font-size: 14px;
            }
            [dir="rtl"] .logo-container {
                right: 1rem !important;
            }
            [dir="rtl"] .controls-container {
                left: 1rem !important;
            }
            .logo-container {
                left: 1rem !important;
            }
            .controls-container {
                right: 1rem !important;
            }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .logo-container {
                left: 1.5rem !important;
            }
            .controls-container {
                right: 1.5rem !important;
            }
            [dir="rtl"] .logo-container {
                right: 1.5rem !important;
                left: auto !important;
            }
            [dir="rtl"] .controls-container {
                left: 1.5rem !important;
                right: auto !important;
            }
        }

        /* Background pattern */
        .bg-pattern {
            background-image: radial-gradient(circle at 10% 20%, rgba(193, 154, 107, 0.03) 1.5px, transparent 1.5px);
            background-size: 28px 28px;
        }
        
        body.dark .bg-pattern {
            background-image: radial-gradient(circle at 10% 20%, rgba(193, 154, 107, 0.08) 1.5px, transparent 1.5px);
        }
        
        /* Container styles */
        .logo-container {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            transition: all 0.3s ease;
        }
        
        .controls-container {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 20;
            display: flex;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }
        
        /* Main content center */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body class="bg-pattern">
    <!-- Logo Container - Fixed positioning that respects RTL -->
    <div class="logo-container">
        <a href="index.html" class="logo-brand" style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C19A6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span style="font-size: 1.875rem; line-height: 2.25rem; font-weight: 900; letter-spacing: -0.02em;">
                <span style="color: #C19A6B;">Tiny</span><span style="color: #C19A6B;">Craft</span>
            </span>
        </a>
    </div>

    <!-- Controls Container - Fixed positioning that respects RTL -->
    <div class="controls-container">
        <!-- Dark Mode Toggle -->
        <button onclick="toggleTheme()" class="control-btn" id="themeBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="moonIcon">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="sunIcon" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <span id="themeText">Dark</span>
        </button>
        
        <!-- RTL Toggle -->
        <button onclick="toggleDirection()" class="control-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3L4 7l4 4"/>
                <path d="M4 7h16"/>
                <path d="M16 21l4-4-4-4"/>
                <path d="M20 17H4"/>
            </svg>
            <span id="dirText">LTR</span>
        </button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="float-404" style="margin-bottom: 1rem;">
            <div style="font-size: clamp(8rem, 20vw, 18rem); font-weight: 900; line-height: 1; letter-spacing: -0.02em; color: #C19A6B; opacity: 0.85;">
                404
            </div>
        </div>
        
        <div style="width: 6rem; height: 0.25rem; background-color: #C19A6B; border-radius: 9999px; margin-bottom: 1.5rem;"></div>
        
        <h1 class="glow-text" style="font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 800; margin-bottom: 1rem; letter-spacing: -0.02em; color: inherit;">
            Lost in <span style="color: #C19A6B;">tiny</span> space?
        </h1>
        
        <p style="font-size: clamp(0.875rem, 3vw, 1.125rem); color: #6B7280; max-width: 28rem; margin-bottom: 2rem; line-height: 1.6;">
            Oops! The page you're looking for doesn't exist or has been moved to a cozier corner.
        </p>
        
        <div style="display: flex; flex-direction: row; gap: 1rem; flex-wrap: wrap; justify-content: center;">
            <button onclick="goHome()" class="btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Return Home
            </button>
            <button onclick="goContact()" class="btn-outline">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                Contact Support
            </button>
        </div>
        
        <div style="margin-top: 3rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #9CA3AF;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
            </svg>
            <span>Try going back to our tiny home collection</span>
        </div>
    </div>

    <!-- Decorative elements -->
    <div style="position: absolute; bottom: 2rem; left: 2rem; opacity: 0.3; pointer-events: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#C19A6B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path>
            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.5 10 16 10 16"></path>
        </svg>
    </div>
    <div style="position: absolute; bottom: 2rem; right: 2rem; opacity: 0.2; pointer-events: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#A3B18A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
        </svg>
    </div>

    <script>
        // Theme toggle function
        function toggleTheme() {
            const body = document.body;
            const moonIcon = document.getElementById('moonIcon');
            const sunIcon = document.getElementById('sunIcon');
            const themeText = document.getElementById('themeText');
            
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                if (moonIcon) moonIcon.style.display = 'block';
                if (sunIcon) sunIcon.style.display = 'none';
                if (themeText) themeText.textContent = 'Dark';
            } else {
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                if (moonIcon) moonIcon.style.display = 'none';
                if (sunIcon) sunIcon.style.display = 'block';
                if (themeText) themeText.textContent = 'Light';
            }
        }
        
        // Direction toggle function with proper positioning
        function toggleDirection() {
            const html = document.documentElement;
            const dirText = document.getElementById('dirText');
            
            if (html.dir === 'rtl') {
                html.dir = 'ltr';
                if (dirText) dirText.textContent = 'LTR';
            } else {
                html.dir = 'rtl';
                if (dirText) dirText.textContent = 'RTL';
            }
            
            // Force reflow to ensure smooth transition
            setTimeout(() => {
                // Update any RTL-specific styles if needed
                const logoContainer = document.querySelector('.logo-container');
                const controlsContainer = document.querySelector('.controls-container');
                
                // Ensure proper positioning after direction change
                if (logoContainer && controlsContainer) {
                    // Force reflow
                    logoContainer.style.display = 'none';
                    controlsContainer.style.display = 'none';
                    setTimeout(() => {
                        logoContainer.style.display = '';
                        controlsContainer.style.display = '';
                    }, 10);
                }
            }, 10);
        }
        
        // Navigation functions
        function goHome() {
            window.location.href = 'index.html';
        }
        
        function goContact() {
            window.location.href = 'contact.html';
        }
        
        // Load saved theme on page load
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            const moonIcon = document.getElementById('moonIcon');
            const sunIcon = document.getElementById('sunIcon');
            const themeText = document.getElementById('themeText');
            if (moonIcon) moonIcon.style.display = 'none';
            if (sunIcon) sunIcon.style.display = 'block';
            if (themeText) themeText.textContent = 'Light';
        }
        
        // Set initial direction text
        const dirTextSpan = document.getElementById('dirText');
        if (dirTextSpan && document.documentElement.dir === 'rtl') {
            dirTextSpan.textContent = 'RTL';
        } else if (dirTextSpan) {
            dirTextSpan.textContent = 'LTR';
        }
        
        // Ensure no scrolling
        document.body.style.overflow = 'hidden';
        document.documentElement.style.overflow = 'hidden';
        
        // Handle RTL positioning on load
        window.addEventListener('load', function() {
            const html = document.documentElement;
            if (html.dir === 'rtl') {
                // Any additional RTL adjustments
                const btnIcons = document.querySelectorAll('.btn-primary svg, .btn-outline svg');
                btnIcons.forEach(icon => {
                    icon.style.transform = 'scaleX(-1)';
                });
            }
        });
    </script>
</body>
</html>
